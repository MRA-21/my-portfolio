<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Gallery App</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <h1>My Image Gallery</h1>
  <div class="gallery-grid">
    <img src="img/img1.jpg" alt="Gallery Image">
    <img src="img/img2.jpg" alt="Gallery Image">
    <img src="img/img3.jpg" alt="Gallery Image">
    <img src="img/img4.jpg" alt="Gallery Image">
    <img src="img/img5.jpg" alt="Gallery Image">
    <img src="img/img6.jpg" alt="Gallery Image">
    <img src="img/img7.jpg" alt="Gallery Image">
  </div>

  <!-- Lightbox -->
  <div id="lightbox" class="hidden">
    <span id="close">&times;</span>
    <img id="lightbox-img" src="" alt="Expanded Image">
  </div>

  <script src="script.js"></script>
</body>
</html>
